server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: place-service

# 高德地图API配置
amap:
  # 高德地图开发者Key（替换为你的真实Key）
  key: 494784b7c649be1390e17df06fc0e48b
  # 逆地理编码API地址模板（使用相对路径，因为WebClient已配置baseUrl）
  regeo-url-template: /v3/geocode/regeo
  # 扩展参数：all返回所有信息，base仅返回基本信息
  extensions: all
  # 编码格式
  charset: UTF-8

# 示例说明（仅注释，非配置项）
# 完整请求示例：
# https://restapi.amap.com/v3/geocode/regeo?location=116.397428,39.90923&key=494784b7c649be1390e17df06fc0e48b&extensions=all